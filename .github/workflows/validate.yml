name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  host-check:
    name: Validate ${{ matrix.host }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host:
          - desktop
          - usb
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build host check
        run: nix build --print-build-logs .#checks.x86_64-linux.${{ matrix.host }}

  script-check:
    name: Validate ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - script-smoke
          - shellcheck
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build script check
        run: nix build --print-build-logs .#checks.x86_64-linux.${{ matrix.check }}
